<div class="container">
  <div class="top-bar">
    <div class="brand">
      <div class="logo">🛡️</div>
      <div>
        <div class="title">CyberSec AI Platform</div>
        <div class="subtitle-small">
          AI-powered content moderation with Spring Cloud & AWS
        </div>
      </div>
    </div>

    <div class="auth-actions">
      <button *ngIf="!isAuthenticated()" class="login-btn" (click)="login()">
        Login
      </button>

      <button *ngIf="isAuthenticated()" class="logout-btn" (click)="logout()">
        Logout
      </button>
    </div>
  </div>

  <div *ngIf="error" class="error">
    {{ error }}
  </div>

  <div class="card">
    <h2>Create Post</h2>

    <textarea
      [(ngModel)]="text"
      placeholder="Write a post to be moderated by AI..."
      rows="4"
    ></textarea>

    <button class="submit-btn" (click)="createPost()" [disabled]="loading || !isAuthenticated()">
      {{ loading ? 'Moderating...' : 'Submit Post' }}
    </button>
  </div>

  <div class="card">
    <h2>Moderated Posts</h2>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Text</th>
          <th>Status</th>
          <th>Created At</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let post of posts()">
          <td>{{ post.id }}</td>
          <td>{{ post.text }}</td>
          <td>
            <span
              class="badge"
              [class.approved]="post.moderationStatus === 'APPROVED'"
              [class.blocked]="post.moderationStatus === 'BLOCKED'"
            >
              {{ post.moderationStatus }}
            </span>
          </td>
          <td>{{ post.createdAt | date:'short' }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
