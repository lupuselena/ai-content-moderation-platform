version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: moderation-postgres

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: moderationdb

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  discovery-service:
    build:
      context: ./discovery-service

    ports:
      - "8761:8761"

  api-gateway:
    build:
      context: ./api-gateway

    ports:
      - "8080:8080"

    depends_on:
      - discovery-service

  moderation-service:
    build:
      context: ./moderation-service

    ports:
      - "8000:8000"

    env_file:
      - ./moderation-service/.env
      
  content-service:
    build:
      context: ./content-service

    ports:
      - "3000:3000"

    env_file:
      - ./content-service/.env
      
    depends_on:
      - postgres
      - moderation-service

volumes:
  postgres-data: